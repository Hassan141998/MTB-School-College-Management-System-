{% extends "base.html" %}
{% block title %}Collect Fee{% endblock %}
{% block page_title %}Collect Fee{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Collect Fee Payment</h1></div>
    <div class="page-actions"><a href="{{ url_for('fees.index') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:700px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-cash-coin"></i> Payment Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-row cols-2">
          <div class="form-group">
            <label class="form-label">Student <span class="required">*</span></label>
            <select name="student_id" id="student_id" class="form-control" required>
              <option value="">Select Student</option>
              {% for s in students %}<option value="{{ s.id }}" {% if selected_student_id==s.id %}selected{% endif %}>{{ s.full_name }} ({{ s.reg_no }})</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Fee Structure</label>
            <select name="fee_structure_id" id="fee_structure_id" class="form-control">
              <option value="">Select Fee Type</option>
              {% for fs in structures %}<option value="{{ fs.id }}">{{ fs.name }} — {{ fs.amount | currency }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Total Amount (PKR)</label>
            <input type="number" name="amount" id="amount" class="form-control currency-input" min="0" step="1" value="0">
          </div>
          <div class="form-group">
            <label class="form-label">Amount Being Paid (PKR) <span class="required">*</span></label>
            <input type="number" name="paid_amount" id="paid_amount" class="form-control currency-input" min="1" step="1" value="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">Discount (PKR)</label>
            <input type="number" name="discount" class="form-control currency-input" min="0" step="1" value="0">
          </div>
          <div class="form-group">
            <label class="form-label">Fine (PKR)</label>
            <input type="number" name="fine" class="form-control currency-input" min="0" step="1" value="0">
          </div>
          <div class="form-group">
            <label class="form-label">Payment Method</label>
            <select name="payment_method" class="form-control">
              {% for m in ['cash','bank_transfer','cheque','online'] %}<option value="{{ m }}">{{ m | replace('_',' ') | title }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Month (for monthly fees)</label>
            <input type="month" name="month" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Payment Date</label>
            <input type="date" name="payment_date" class="form-control" value="{{ today.isoformat() }}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Remarks</label>
          <textarea name="remarks" class="form-control" rows="2" placeholder="Optional notes…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-check-circle-fill"></i> Record Payment & Print Receipt</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
