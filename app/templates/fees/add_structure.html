{% extends "base.html" %}
{% block title %}Add Fee Structure{% endblock %}
{% block page_title %}Add Fee Type{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Add Fee Type</h1></div>
    <div class="page-actions"><a href="{{ url_for('fees.structure') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:560px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-sliders"></i> Fee Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label class="form-label">Name <span class="required">*</span></label><input type="text" name="name" class="form-control" required placeholder="e.g. Monthly Tuition Fee"></div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Fee Type</label><select name="fee_type" class="form-control">{% for t in ['monthly','quarterly','annual','one_time','transport','library','exam'] %}<option value="{{ t }}">{{ t | replace('_',' ') | title }}</option>{% endfor %}</select></div>
          <div class="form-group"><label class="form-label">Amount (PKR) <span class="required">*</span></label><input type="number" name="amount" class="form-control currency-input" min="1" step="10" required></div>
          <div class="form-group"><label class="form-label">Applicable Class</label><input type="text" name="class_name" class="form-control" placeholder="Leave blank for all classes"></div>
          <div class="form-group"><label class="form-label">Due Day of Month</label><input type="number" name="due_day" class="form-control" min="1" max="28" value="10"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> Add Fee Type</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
