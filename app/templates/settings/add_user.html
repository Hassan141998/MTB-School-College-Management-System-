{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block page_title %}Add User{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Add System User</h1></div>
    <div class="page-actions"><a href="{{ url_for('settings.users') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:540px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-person-plus-fill"></i> User Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label class="form-label">Full Name <span class="required">*</span></label><input type="text" name="full_name" class="form-control" required></div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Username <span class="required">*</span></label><input type="text" name="username" class="form-control" required autocomplete="off"></div>
          <div class="form-group"><label class="form-label">Email <span class="required">*</span></label><input type="email" name="email" class="form-control" required></div>
        </div>
        <div class="form-group"><label class="form-label">Role <span class="required">*</span></label>
          <select name="role" class="form-control" required>
            {% for r in ['admin','principal','hod','teacher','accountant','receptionist','librarian','parent','student'] %}
            <option value="{{ r }}">{{ r | title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Password <span class="required">*</span></label><input type="password" name="password" class="form-control" required minlength="6"></div>
          <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" name="confirm_password" class="form-control" required></div>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-person-plus-fill"></i> Create User</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
