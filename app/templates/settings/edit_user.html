{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Edit User — {{ user.full_name }}</h1></div>
    <div class="page-actions"><a href="{{ url_for('settings.users') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:540px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-person-fill"></i> User Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label class="form-label">Full Name <span class="required">*</span></label><input type="text" name="full_name" class="form-control" required value="{{ user.full_name }}"></div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Username</label><input type="text" class="form-control" value="{{ user.username }}" disabled></div>
          <div class="form-group"><label class="form-label">Email <span class="required">*</span></label><input type="email" name="email" class="form-control" required value="{{ user.email }}"></div>
        </div>
        <div class="form-group"><label class="form-label">Role</label><select name="role" class="form-control">{% for r in ['admin','principal','hod','teacher','accountant','receptionist','librarian','parent','student'] %}<option value="{{ r }}" {% if user.role==r %}selected{% endif %}>{{ r | title }}</option>{% endfor %}</select></div>
        <div class="form-group"><label class="toggle-switch"><input type="checkbox" name="is_active" class="toggle-input" {% if user.is_active %}checked{% endif %}><div class="toggle-track"><div class="toggle-thumb"></div></div><span class="toggle-label">Active Account</span></label></div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
