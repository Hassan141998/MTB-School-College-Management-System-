{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block page_title %}Reset Password{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Reset Password — {{ user.full_name }}</h1></div>
    <div class="page-actions"><a href="{{ url_for('settings.users') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:480px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-lock-fill"></i> Set New Password</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label class="form-label">New Password <span class="required">*</span></label><input type="password" name="new_password" class="form-control" required minlength="6"></div>
        <div class="form-group"><label class="form-label">Confirm Password <span class="required">*</span></label><input type="password" name="confirm_password" class="form-control" required></div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-lock-fill"></i> Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
