{% extends "base.html" %}
{% block title %}Add Book{% endblock %}
{% block page_title %}Add Book{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Add New Book</h1></div>
    <div class="page-actions"><a href="{{ url_for('library.index') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:640px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-book-fill"></i> Book Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-row cols-2">
          <div class="form-group" style="grid-column:span 2"><label class="form-label">Title <span class="required">*</span></label><input type="text" name="title" class="form-control" required value="{{ request.form.get('title','') }}"></div>
          <div class="form-group"><label class="form-label">Author <span class="required">*</span></label><input type="text" name="author" class="form-control" required value="{{ request.form.get('author','') }}"></div>
          <div class="form-group"><label class="form-label">ISBN</label><input type="text" name="isbn" class="form-control" placeholder="978-XXXXXXXXXX" value="{{ request.form.get('isbn','') }}"></div>
          <div class="form-group"><label class="form-label">Category</label><input type="text" name="category" class="form-control" list="catList" placeholder="e.g. Science, History, Fiction" value="{{ request.form.get('category','') }}"><datalist id="catList">{% for cat in categories %}<option value="{{ cat }}">{% endfor %}</datalist></div>
          <div class="form-group"><label class="form-label">Publisher</label><input type="text" name="publisher" class="form-control" value="{{ request.form.get('publisher','') }}"></div>
          <div class="form-group"><label class="form-label">Publication Year</label><input type="number" name="publication_year" class="form-control" min="1900" max="2099" value="{{ request.form.get('publication_year','') }}"></div>
          <div class="form-group"><label class="form-label">Total Copies <span class="required">*</span></label><input type="number" name="total_copies" class="form-control" required min="1" value="{{ request.form.get('total_copies',1) }}"></div>
          <div class="form-group"><label class="form-label">Shelf / Location</label><input type="text" name="shelf_location" class="form-control" placeholder="e.g. A-12" value="{{ request.form.get('shelf_location','') }}"></div>
        </div>
        <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ request.form.get('description','') }}</textarea></div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> Add Book</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
