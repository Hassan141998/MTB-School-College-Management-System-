{% extends "base.html" %}
{% block title %}Apply for Leave{% endblock %}
{% block page_title %}Apply for Leave{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Leave Application</h1></div>
    <div class="page-actions"><a href="{{ url_for('attendance.leave_list') }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:600px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-file-earmark-plus-fill"></i> Application Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Applicant Type</label>
          <select name="entity_type" class="form-control" id="entityType" onchange="toggleEntity(this.value)">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>
        <div class="form-group" id="studentSelect">
          <label class="form-label">Student <span class="required">*</span></label>
          <select name="student_id" class="form-control"><option value="">Select Student</option>{% for s in students %}<option value="{{ s.id }}">{{ s.full_name }} ({{ s.reg_no }})</option>{% endfor %}</select>
        </div>
        <div class="form-group" id="teacherSelect" style="display:none">
          <label class="form-label">Teacher <span class="required">*</span></label>
          <select name="teacher_id" class="form-control"><option value="">Select Teacher</option>{% for t in teachers %}<option value="{{ t.id }}">{{ t.full_name }} ({{ t.employee_id }})</option>{% endfor %}</select>
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Leave Type</label><select name="leave_type" class="form-control">{% for t in ['casual','sick','emergency','vacation'] %}<option value="{{ t }}">{{ t | title }}</option>{% endfor %}</select></div>
          <div class="form-group"></div>
          <div class="form-group"><label class="form-label">From Date <span class="required">*</span></label><input type="date" name="start_date" class="form-control" required></div>
          <div class="form-group"><label class="form-label">To Date <span class="required">*</span></label><input type="date" name="end_date" class="form-control" required></div>
        </div>
        <div class="form-group"><label class="form-label">Reason <span class="required">*</span></label><textarea name="reason" class="form-control" rows="3" required placeholder="Please provide reason for leave…"></textarea></div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send-fill"></i> Submit Application</button>
      </form>
    </div>
  </div>
</div>
<script>function toggleEntity(v){document.getElementById('studentSelect').style.display=v==='student'?'':'none';document.getElementById('teacherSelect').style.display=v==='teacher'?'':'none';}</script>
{% endblock %}
