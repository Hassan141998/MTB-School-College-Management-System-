{% extends "base.html" %}
{% block title %}Add Subject{% endblock %}
{% block page_title %}Add Subject to Exam{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title-group"><h1 class="page-title">Add Subject — {{ exam.name }}</h1></div>
    <div class="page-actions"><a href="{{ url_for('exams.view', id=exam.id) }}" class="btn btn-light"><i class="bi bi-arrow-left"></i> Back</a></div>
  </div>
</div>
<div style="max-width:560px">
  <div class="card">
    <div class="card-header"><h5 class="card-title"><i class="bi bi-book-fill"></i> Subject Details</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label class="form-label">Subject <span class="required">*</span></label><select name="subject_id" class="form-control" required><option value="">Select Subject</option>{% for s in subjects %}<option value="{{ s.id }}">{{ s.name }} ({{ s.code }})</option>{% endfor %}</select></div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Total Marks <span class="required">*</span></label><input type="number" name="total_marks" class="form-control" required min="1" value="100"></div>
          <div class="form-group"><label class="form-label">Passing Marks <span class="required">*</span></label><input type="number" name="passing_marks" class="form-control" required min="1" value="33"></div>
          <div class="form-group"><label class="form-label">Exam Date</label><input type="date" name="exam_date" class="form-control"></div>
          <div class="form-group"><label class="form-label">Start Time</label><input type="time" name="start_time" class="form-control"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> Add Subject</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
