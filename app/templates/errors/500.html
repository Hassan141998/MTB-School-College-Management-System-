<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 Error — MTB School</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center;padding:24px}
    .err-box{max-width:480px}
    .err-code{font-size:120px;font-weight:800;line-height:1;background:linear-gradient(135deg,#FF6B35,#F7B801);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .err-title{font-size:24px;font-weight:700;margin:16px 0 10px}
    .err-msg{color:rgba(255,255,255,.6);font-size:14px;line-height:1.7;margin-bottom:28px}
    .err-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#FF6B35;color:white;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;transition:all .2s}
    .err-btn:hover{background:#e05520;transform:translateY(-2px)}
    .err-icon{font-size:56px;margin-bottom:16px;opacity:.7}
  </style>
</head>
<body>
<div class="err-box">
  <div class="err-icon">⚠️</div>
  <div class="err-code">500</div>
  <div class="err-title">Server Error</div>
  <p class="err-msg">Something went wrong on our end. Our team has been notified. Please try again in a moment.</p>
  <a href="/" class="err-btn"><i class="bi bi-house-fill"></i> Back to Dashboard</a>
</div>
</body>
</html>
